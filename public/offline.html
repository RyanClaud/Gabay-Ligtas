<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gabay Ligtas - Offline</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&display=swap');
        body {
            font-family: 'Lexend', sans-serif;
            background-color: #f0f4f8;
            color: #1a202c;
        }
        .elder-text {
            font-size: 1.5rem;
            line-height: 2rem;
            font-weight: 500;
        }
        .elder-text-small {
            font-size: 1.25rem;
            line-height: 1.75rem;
        }
    </style>
</head>
<body class="min-h-screen bg-slate-50 flex items-center justify-center p-4">
    <div class="max-w-md mx-auto text-center bg-white rounded-3xl p-8 shadow-2xl">
        <div class="w-24 h-24 bg-blue-100 rounded-full flex items-center justify-center mx-auto mb-6">
            <i class="fas fa-wifi-slash text-4xl text-blue-600"></i>
        </div>
        
        <h1 class="elder-text font-bold text-gray-900 mb-4">
            Walang Internet Connection
        </h1>
        
        <p class="elder-text-small text-gray-600 mb-6">
            Hindi ka nakakonekta sa internet ngayon. Subukan ulit kapag may connection na.
        </p>
        
        <div class="space-y-4">
            <button 
                onclick="window.location.reload()" 
                class="w-full bg-blue-600 text-white py-4 px-6 rounded-2xl elder-text-small font-semibold hover:bg-blue-700 transition-colors"
            >
                <i class="fas fa-sync-alt mr-2"></i>
                Subukan Ulit
            </button>
            
            <button 
                onclick="history.back()" 
                class="w-full bg-gray-200 text-gray-700 py-4 px-6 rounded-2xl elder-text-small font-semibold hover:bg-gray-300 transition-colors"
            >
                <i class="fas fa-arrow-left mr-2"></i>
                Bumalik
            </button>
        </div>
        
        <div class="mt-8 p-4 bg-blue-50 rounded-2xl">
            <p class="elder-text-small text-blue-800">
                <i class="fas fa-lightbulb mr-2"></i>
                <strong>Tip:</strong> Kapag may internet na, mag-refresh para sa pinakabagong features.
            </p>
        </div>
    </div>
</body>
</html>
