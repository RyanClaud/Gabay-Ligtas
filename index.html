<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <meta name="theme-color" content="#2563eb" />

    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Gabay Ligtas" />
    <meta name="format-detection" content="telephone=no" />

    <link rel="icon" type="image/png" sizes="32x32" href="/icons/icon-32x32.png" />

    <link rel="apple-touch-icon" sizes="180x180" href="/icons/apple-touch-icon (1).png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192x192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/icons/icon-512x512.png" />
    
    <!-- Styles - Load Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <noscript>
      <link rel="stylesheet" href="https://unpkg.com/tailwindcss@3.4.0/dist/tailwind.min.css">
    </noscript>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&display=swap');
      
      /* Critical CSS - Ensures basic styling even if Tailwind fails */
      * {
        box-sizing: border-box;
      }
      
      body {
        font-family: 'Lexend', sans-serif;
        background-color: #f0f4f8;
        color: #1a202c;
        margin: 0;
        padding: 0;
        min-height: 100vh;
      }
      
      /* Fallback styles if Tailwind doesn't load */
      .fallback-container {
        min-height: 100vh;
        background-color: #f1f5f9;
        display: flex;
        flex-direction: column;
        max-width: 448px;
        margin: 0 auto;
        position: relative;
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
        overflow-x: hidden;
        border-left: 1px solid #e5e7eb;
        border-right: 1px solid #e5e7eb;
      }
      
      .fallback-header {
        background-color: #2563eb;
        color: white;
        padding: 2rem;
        padding-top: 3rem;
        border-radius: 0 0 3rem 3rem;
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
        z-index: 10;
        border-bottom: 4px solid #1d4ed8;
      }
      
      .fallback-main {
        flex: 1;
        padding: 1.5rem;
        overflow-y: auto;
        padding-top: 2.5rem;
      }
      
      .fallback-nav {
        position: sticky;
        bottom: 0;
        left: 0;
        right: 0;
        background-color: white;
        border-top: 4px solid #f3f4f6;
        display: flex;
        justify-content: space-around;
        padding: 1.25rem;
        padding-bottom: 2rem;
        border-radius: 2.5rem 2.5rem 0 0;
        box-shadow: 0 -15px 30px -5px rgba(0, 0, 0, 0.1);
        z-index: 20;
      }
      
      /* Significantly larger text for elderly readability */
      .elder-text {
        font-size: 1.5rem;
        line-height: 2rem;
        font-weight: 500;
      }
      
      .elder-text-small {
        font-size: 1.25rem;
        line-height: 1.75rem;
      }
      
      .safe-shadow {
        box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
      }
      
      /* Custom focus styles for better visibility */
      textarea:focus {
        background-color: #ffffff !important;
        border-color: #2563eb !important;
        box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.2) !important;
      }

      /* Mobile touch feedback */
      button:active {
        transform: scale(0.92);
        opacity: 0.8;
      }

      /* Responsive elder text */
      @media (min-width: 640px) {
        .elder-text {
          font-size: 1.875rem;
          line-height: 2.25rem;
        }
        
        .elder-text-small {
          font-size: 1.5rem;
          line-height: 2rem;
        }
        
        .fallback-container {
          max-width: 512px;
        }
      }

      @media (min-width: 768px) {
        .elder-text {
          font-size: 2.25rem;
          line-height: 2.5rem;
        }
        
        .elder-text-small {
          font-size: 1.5rem;
          line-height: 2rem;
        }
        
        .fallback-container {
          max-width: 576px;
        }
      }

      @media (min-width: 1024px) {
        .fallback-container {
          max-width: 672px;
        }
      }

      /* Additional custom styles for enhanced mobile experience */
      .animate-slideUp {
        animation: slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      }
      .animate-fadeIn {
        animation: fadeIn 0.4s ease-out forwards;
      }
      .animate-popIn {
        animation: popIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
      }
      .animate-shimmer {
        background: linear-gradient(90deg, #2563eb 0%, #60a5fa 50%, #2563eb 100%);
        background-size: 200% 100%;
        animation: shimmer 1.5s infinite linear;
      }
      .animate-bounce-short {
        animation: bounce 1.5s ease-in-out infinite;
      }
      
      @keyframes slideUp {
        from { transform: translateY(100%); opacity: 0; }
        to { transform: translateY(0); opacity: 1; }
      }
      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
      }
      @keyframes popIn {
        0% { transform: scale(0.9); opacity: 0; }
        70% { transform: scale(1.05); opacity: 1; }
        100% { transform: scale(1); opacity: 1; }
      }
      @keyframes shimmer {
        0% { background-position: -200% 0; }
        100% { background-position: 200% 0; }
      }
      @keyframes bounce {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-8px); }
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",

  }

</script>

<!-- Tailwind CSS Detection and Fallback -->
<script>
  // Check if Tailwind CSS loaded properly
  window.addEventListener('load', function() {
    setTimeout(function() {
      // Test if Tailwind classes are working
      const testElement = document.createElement('div');
      testElement.className = 'bg-blue-500 text-white p-4 hidden';
      document.body.appendChild(testElement);
      
      const computedStyle = window.getComputedStyle(testElement);
      const hasBlueBackground = computedStyle.backgroundColor === 'rgb(59, 130, 246)';
      
      document.body.removeChild(testElement);
      
      if (!hasBlueBackground) {
        console.warn('⚠️ Tailwind CSS may not have loaded properly');
        // Add fallback classes to body
        document.body.classList.add('tailwind-fallback');
      } else {
        console.log('✅ Tailwind CSS loaded successfully');
      }
    }, 1000);
  });
</script>
</head>
  <body>
    <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
